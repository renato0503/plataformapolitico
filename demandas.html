<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Demandas — EloEleitoral</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/demandas.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="css/painel.css"> 
    
    <style>
        body { margin: 0; background-color: var(--bg-color); overflow-x: hidden; }
        .dashboard-layout { display: flex; min-height: 100vh; }
        
        /* Estilos do Menu Sidebar (serão injetados aqui) */
        .sidebar { width: 260px; background: var(--surface-color); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; position: sticky; top: 0; height: 100vh; z-index: 100; }
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; gap: 10px; font-weight: 700; color: var(--primary-color); font-size: 1.2rem; }
        .sidebar-header i { color: var(--accent-color); font-size: 1.8rem; }
        .sidebar-nav { padding: 10px 0 20px 0; flex: 1; overflow-y: auto; overflow-x: hidden; }
        .nav-category { padding: 20px 20px 5px 20px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; color: var(--text-muted); opacity: 0.7; }
        .nav-item { padding: 12px 20px; display: flex; align-items: center; gap: 12px; color: var(--text-muted); text-decoration: none; font-weight: 500; transition: all 0.2s; border-left: 3px solid transparent; }
        .nav-item:hover { background: var(--bg-color); color: var(--primary-color); }
        .nav-item.active { background: #EBF8FF; color: var(--primary-color); border-left-color: var(--primary-color); font-weight: 600; }
        .nav-item i { font-size: 1.4rem; }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-muted); }
        
        /* Layout Principal */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .top-header { background: var(--surface-color); padding: 15px 30px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 90; }
        .header-search { display: flex; align-items: center; background: var(--bg-color); padding: 8px 15px; border-radius: var(--radius-md); width: 300px; border: 1px solid var(--border-color); }
        .header-search input { border: none; background: transparent; outline: none; width: 100%; margin-left: 10px; font-family: inherit; }
        .header-actions { display: flex; align-items: center; gap: 20px; }
        .user-profile { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--text-main); }
        .avatar { width: 35px; height: 35px; background: var(--primary-color); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; }
        .painel-content { padding: 30px; max-width: 1400px; margin: 0 auto; width: 100%; }
        .page-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        
        <div id="sidebar-container"></div>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-search">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="busca-kanban" placeholder="Buscar no quadro...">
                </div>
                <div class="header-actions">
                    <div class="user-profile">
                        <div class="avatar"><i class="ph ph-user"></i></div>
                        Equipe de Triagem
                    </div>
                </div>
            </header>

            <main class="painel-content">
                <div class="page-title">
                    <h2>Quadro de Resolução (Kanban)</h2>
                    <button id="btn-nova-demanda-manual" class="btn btn-primary">
                        <i class="ph ph-plus" style="margin-right: 8px;"></i> Nova Demanda Interna
                    </button>
                </div>

                <div class="kanban-board">
                    <div class="kanban-column" id="col-nova">
                        <div class="kanban-header">
                            <h3 style="color: var(--info);">Novas</h3>
                            <span class="kanban-count" id="count-nova">0</span>
                        </div>
                        <div class="kanban-cards" id="cards-nova"></div>
                    </div>

                    <div class="kanban-column" id="col-analise">
                        <div class="kanban-header">
                            <h3 style="color: var(--warning);">Em Análise</h3>
                            <span class="kanban-count" id="count-analise">0</span>
                        </div>
                        <div class="kanban-cards" id="cards-analise"></div>
                    </div>

                    <div class="kanban-column" id="col-respondida">
                        <div class="kanban-header">
                            <h3 style="color: var(--primary-color);">Respondidas</h3>
                            <span class="kanban-count" id="count-respondida">0</span>
                        </div>
                        <div class="kanban-cards" id="cards-respondida"></div>
                    </div>

                    <div class="kanban-column" id="col-encerrada">
                        <div class="kanban-header">
                            <h3 style="color: var(--accent-color);">Encerradas</h3>
                            <span class="kanban-count" id="count-encerrada">0</span>
                        </div>
                        <div class="kanban-cards" id="cards-encerrada"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="js/pages/demandas-controller.js"></script>
</body>
</html>
