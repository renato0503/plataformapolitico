<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Estratégica — EloEleitoral</title>
    
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/painel.css">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        .agenda-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; align-items: start; margin-top: 20px; }
        
        .mini-calendario { background: white; border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-sm); text-align: center; }
        .mini-calendario h3 { margin-bottom: 20px; color: var(--primary-color); }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .cal-dia-semana { font-size: 0.8rem; font-weight: bold; color: var(--text-muted); }
        .cal-dia { padding: 8px; border-radius: 50%; font-size: 0.9rem; margin: 2px; cursor: pointer; transition: background 0.2s;}
        .cal-dia:hover { background: #EDF2F7; }
        .cal-dia.today { background: var(--primary-color); color: white; font-weight: bold; }
        .cal-dia.has-event { border-bottom: 3px solid var(--accent-color); padding-bottom: 5px; }

        .agenda-feed { display: flex; flex-direction: column; gap: 15px; }
        
        .evento-card { background: white; border-radius: var(--radius-lg); padding: 20px; border-left: 5px solid var(--primary-color); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 10px; transition: transform 0.2s;}
        .evento-card:hover { transform: translateX(5px); }
        .evento-card.tipo-caminhada { border-left-color: #38A169; }
        .evento-card.tipo-reuniao { border-left-color: #3182CE; }
        .evento-card.tipo-midia { border-left-color: #E53E3E; }

        .evento-header { display: flex; justify-content: space-between; align-items: center; }
        .evento-titulo { font-size: 1.2rem; font-weight: bold; color: var(--text-main); margin: 0; }
        .evento-tipo { font-size: 0.8rem; padding: 4px 10px; border-radius: 12px; font-weight: 600; text-transform: uppercase; background: var(--bg-color); color: var(--text-muted);}
        
        .evento-detalhes { display: flex; gap: 15px; color: var(--text-muted); font-size: 0.95rem; align-items: center; flex-wrap: wrap;}
        .evento-detalhes i { color: var(--primary-color); font-size: 1.1rem; }
        
        .evento-actions { margin-top: 10px; border-top: 1px solid var(--border-color); padding-top: 10px; display: flex; gap: 10px; }
        
        .novo-evento-box { background: #EBF8FF; padding: 20px; border-radius: var(--radius-lg); margin-top: 20px; border: 1px dashed #3182CE; }

        @media (max-width: 900px) {
            .agenda-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    
    <div class="dashboard-layout">
        
        <div id="sidebar-container"></div>

        <div class="main-wrapper">
            <header class="top-header">
                <div class="header-search">
                    <i class="ph ph-magnifying-glass" style="color: var(--text-muted);"></i>
                    <input type="text" placeholder="Buscar compromisso...">
                </div>
                <!-- ... user actions (omitted for brevity, assume JS handles common header) ... -->
                 <div class="header-actions">
                    <i class="ph ph-bell" style="font-size: 1.4rem; color: var(--text-muted); cursor: pointer;"></i>
                    <div class="user-profile">
                        <div class="avatar">GB</div>
                        Gabinete
                    </div>
                </div>
            </header>

            <main class="painel-content">
                <div class="page-title">
                    <h2><i class="ph ph-calendar-check" style="margin-right: 8px; color: var(--primary-color);"></i> Agenda da Campanha</h2>
                    <button class="btn btn-primary" onclick="alert('Funcionalidade de adicionar evento abrindo modal...')">
                        <i class="ph ph-plus" style="margin-right: 8px;"></i> Novo Evento
                    </button>
                </div>

                <div class="agenda-grid">
                    <aside>
                        <div class="mini-calendario">
                            <h3 id="mes-titulo">Novembro 2026</h3>
                            <div class="cal-grid">
                                <span class="cal-dia-semana">Dom</span><span class="cal-dia-semana">Seg</span><span class="cal-dia-semana">Ter</span>
                                <span class="cal-dia-semana">Qua</span><span class="cal-dia-semana">Qui</span><span class="cal-dia-semana">Sex</span><span class="cal-dia-semana">Sáb</span>
                                
                                <span class="cal-dia">1</span><span class="cal-dia">2</span><span class="cal-dia">3</span>
                                <span class="cal-dia">4</span><span class="cal-dia">5</span><span class="cal-dia has-event">6</span>
                                <span class="cal-dia">7</span><span class="cal-dia">8</span><span class="cal-dia">9</span>
                                <span class="cal-dia">10</span><span class="cal-dia today">11</span><span class="cal-dia has-event">12</span>
                                <span class="cal-dia">13</span><span class="cal-dia">14</span><span class="cal-dia">15</span>
                                <span class="cal-dia has-event">16</span><span class="cal-dia">17</span><span class="cal-dia">18</span>
                                <!-- etc... -->
                            </div>
                        </div>

                        <div class="novo-evento-box">
                            <h4 style="color: #2B6CB0; margin-bottom: 10px;">Lembrar Comando de Rua</h4>
                            <p style="font-size: 0.9rem; color: var(--text-main); margin-bottom: 15px;">É possível disparar lembretes via WhatsApp para a equipe sobre as agendas do dia.</p>
                            <button class="btn btn-sm btn-outline" style="width: 100%; border-color: #3182CE; color: #3182CE;" onclick="alert('Notificando a equipe de rua...')">
                                <i class="ph ph-paper-plane-tilt"></i> Notificar Equipe
                            </button>
                        </div>
                    </aside>

                    <section class="agenda-feed" id="agenda-lista">
                        <!-- Eventos injetados pelo JS -->
                    </section>
                </div>

            </main>
        </div>
    </div>

    <!-- Modulos da Pagina -->
    <script type="module" src="js/pages/agenda-controller.js"></script>
</body>
</html>
