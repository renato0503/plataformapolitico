<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envie sua Demanda — EloEleitoral</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/dialogo.css">
</head>
<body>
    <header class="dialogo-header">
        <div class="container">
            <h1>EloEleitoral</h1>
            <p>Seu canal direto com nosso gabinete. O que sua região precisa?</p>
        </div>
    </header>

    <main class="container">
        <div class="card form-container">
            <div id="mensagem-sucesso" class="feedback-sucesso" style="display: none;">
                <h3>✅ Demanda Registrada!</h3>
                <p>Muito obrigado pela sua participação. Nossa equipe já recebeu sua mensagem e entrará em contato em breve.</p>
                <button id="btn-nova-demanda" class="btn btn-outline" style="margin-top: 15px;">Enviar outra demanda</button>
            </div>

            <form id="form-demanda">
                <div class="form-group">
                    <label class="form-label" for="nome">Nome Completo</label>
                    <input type="text" id="nome" class="form-control" placeholder="Ex: João da Silva" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="contato">WhatsApp para Retorno</label>
                    <input type="tel" id="contato" class="form-control" placeholder="(65) 90000-0000" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="bairro">Seu Bairro</label>
                    <select id="bairro" class="form-control" required>
                        <option value="" disabled selected>Selecione sua região...</option>
                        <option value="CPA">CPA (I, II, III ou IV)</option>
                        <option value="Coxipó">Região do Coxipó</option>
                        <option value="Tijucal">Tijucal</option>
                        <option value="Pedra 90">Pedra 90</option>
                        <option value="Santa Rosa">Santa Rosa</option>
                        <option value="Centro">Centro / Porto</option>
                        <option value="Morada do Ouro">Morada do Ouro</option>
                        <option value="Outro">Outro Bairro...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="mensagem">Descreva o Problema ou Sugestão</label>
                    <textarea id="mensagem" class="form-control" rows="4" placeholder="Ex: Tem um buraco enorme na avenida principal..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary btn-block" id="btn-enviar">Enviar Demanda</button>
            </form>
        </div>
    </main>

    <script type="module" src="js/pages/dialogo-controller.js"></script>
</body>
</html>
